# 1. VISIBILITY OVERRIDES [cite: 2026-02-22]
# Force tracks and paths to appear at Z12
transportation_name_limit_merge=false
transportation_min_zoom=12
osm_transportation_name_min_zoom=12

# 2. TAG INCLUSION (The Missing Elements) [cite: 2026-02-22]
# This tells the POI layer to stop ignoring these specific tags
poi_class_include=spring,waterfall,cave_entrance,wayside_cross,cross,mountain_pass,shelter,tower,mast,antenna

# 3. EXTRA DATA FOR SEARCH
# Keep more attributes so our search tool finds "Saua" or "Pestera"
extra_osm_tags=true
